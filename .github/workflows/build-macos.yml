name: build-macos

on:
  push:
    branches: [main, runtime-binary, lein-jank-build-system]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: macos-arm64
    runs-on: macos-14   # Apple silicon, Sonoma

    env:
      # Track jank main, but key the cache by the resolved commit SHA so each
      # upstream change gets a fresh build.
      JANK_REF: main
      CACHE_REV: "v1"
      # Homebrew on Apple silicon
      HOMEBREW_PREFIX: /opt/homebrew

    steps:
      - name: Checkout opengl-with-jank
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------------------------------------------------------------------
      # System dependencies via Homebrew (LLVM 22 binary, no from-source build)
      # ---------------------------------------------------------------------
      - name: Install brew deps
        run: |
          # Skip `brew update` — slowest step, runners stay fairly current.
          brew install llvm cmake ninja boost openssl@3 zstd doctest leiningen
          installed_major=$(/opt/homebrew/opt/llvm/bin/clang --version \
            | head -1 | grep -oE 'version [0-9]+' | awk '{print $2}')
          if [[ "$installed_major" != "22" ]]; then
            echo "::error::brew llvm is version $installed_major; jank $JANK_REF needs 22.x"
            exit 1
          fi

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      # ---------------------------------------------------------------------
      # Build jank against brew's LLVM (cached)
      # ---------------------------------------------------------------------
      # The cache key is intentionally independent of `brew list --versions`
      # output, which churns whenever Homebrew bumps the formula's bottle
      # (e.g. 22.1.4 → 22.1.5 within a week). Within LLVM 22.x the ABI is
      # stable enough to keep the cached jank build valid; the version check
      # above already aborts the job if brew jumps to 23.x. Bump CACHE_REV
      # to invalidate manually.
      # Three things together get jank's cppinterop submodule past the
      # libc++-22 / Apple-SDK header chain that bit us last time:
      #
      #   1. SDKROOT exported in the same shell that runs configure+build,
      #      not via $GITHUB_ENV (which propagates to *next* step but not
      #      to subprocesses launched within this step).
      #   2. CMAKE_OSX_SYSROOT so cmake's compile checks use the same SDK.
      #   3. -stdlib=libc++ in CXXFLAGS so brew's clang explicitly picks
      #      brew's libc++ (its default driver does this on macOS, but
      #      cppinterop's CMake can override it).
      - name: Resolve jank ref
        id: jank-ref
        run: |
          sha="$(git ls-remote https://github.com/jank-lang/jank "$JANK_REF" | awk '{print $1}')"
          if [[ -z "$sha" ]]; then
            echo "::error::unable to resolve jank ref: $JANK_REF"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved jank $JANK_REF -> $sha"

      - name: Cache jank build
        id: cache-jank
        uses: actions/cache@v4
        with:
          path: ~/jank
          key: jank-mac14-${{ steps.jank-ref.outputs.sha }}-${{ env.CACHE_REV }}

      - name: Clone & build jank (against brew LLVM 22)
        if: steps.cache-jank.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/jank-lang/jank ~/jank
          cd ~/jank
          git checkout "${{ steps.jank-ref.outputs.sha }}"
          git submodule update --init --recursive
          cd compiler+runtime
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          export CC="$HOMEBREW_PREFIX/opt/llvm/bin/clang"
          export CXX="$HOMEBREW_PREFIX/opt/llvm/bin/clang++"
          export CXXFLAGS="-stdlib=libc++ -isysroot $SDKROOT"
          ./bin/configure -G Ninja \
            -Djank_local_clang=OFF \
            -Dllvm_dir="$HOMEBREW_PREFIX/opt/llvm" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_SYSROOT="$SDKROOT"
          cmake --build build -j "$(sysctl -n hw.ncpu)"

      - name: Symlink jank into PATH
        run: |
          sudo mkdir -p /usr/local/bin
          sudo ln -sf "$HOME/jank/compiler+runtime/build/jank" /usr/local/bin/jank

      - name: jank check-health
        run: jank check-health

      - name: Verify portability checker self-test
        working-directory: engine
        run: ./scripts/verify-portability --self-test

      # ---------------------------------------------------------------------
      # Build the engine
      # ---------------------------------------------------------------------
      - name: Engine setup (native deps + embedded assets)
        working-directory: engine
        env:
          JANK_LLVM: /opt/homebrew/opt/llvm
          SDKROOT: ""  # set below
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./scripts/setup

      - name: Build engine binary
        working-directory: engine
        env:
          JANK_LLVM: /opt/homebrew/opt/llvm
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./scripts/build-engine

      - name: Verify dev engine portability
        working-directory: engine
        env:
          JANK_LLVM: /opt/homebrew/opt/llvm
        run: ./scripts/verify-portability dist/jank-engine

      - name: Bake game distribution
        working-directory: engine
        env:
          JANK_LLVM: /opt/homebrew/opt/llvm
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./scripts/bake ../game -o /tmp/sca-bake

      - name: Verify baked distribution portability
        working-directory: engine
        env:
          JANK_LLVM: /opt/homebrew/opt/llvm
        run: ./scripts/verify-portability /tmp/sca-bake

      - name: Smoke test baked distribution (server bind)
        run: |
          set -eo pipefail
          /tmp/sca-bake/sca_run server > /tmp/baked-server.log 2>&1 &
          SERVER_PID=$!

          bound=0
          for i in $(seq 1 20); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::baked server exited before binding UDP/7777"
              break
            fi
            if lsof -nP -p "$SERVER_PID" 2>/dev/null | grep -qE 'UDP.*:7777'; then
              bound=1
              echo "✓ baked server bound UDP/7777"
              break
            fi
            sleep 1
          done

          if [[ "$bound" -ne 1 ]]; then
            cat /tmp/baked-server.log || true
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi

          kill "$SERVER_PID" 2>/dev/null || true
          wait "$SERVER_PID" 2>/dev/null || true

      # ---------------------------------------------------------------------
      # Smoke test (server only)
      # ---------------------------------------------------------------------
      # macOS-on-GitHub runners don't expose a usable Cocoa session to
      # non-interactive jobs — `glfwCreateWindow` returns NULL and the
      # client exits with "Window creation failed". The server has no
      # GL/Cocoa dependency and is the meaningful test for "the engine
      # binary loads, JITs game source, and reaches its main loop."
      - name: Smoke test (server bind)
        working-directory: game
        run: |
          set -eo pipefail
          ENGINE=../engine/dist/jank-engine/jank-engine_run

          # Server (headless, ENet UDP on 7777). First-run PCH bootstrap
          # on macOS can take ~20s, so poll the port instead of a flat sleep.
          "$ENGINE" . server > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          bound=0
          for i in $(seq 1 40); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::server process exited before binding UDP/7777"
              break
            fi
            if lsof -nP -p "$SERVER_PID" 2>/dev/null | grep -qE 'UDP.*:7777'; then
              bound=1
              echo "✓ server bound UDP/7777 (after ~$((i*1))s)"
              break
            fi
            sleep 1
          done

          if [[ "$bound" -ne 1 ]]; then
            echo "::error::server failed to bind UDP/7777 within 40s"
            echo "=== process state ==="
            ps -p "$SERVER_PID" -o pid,etime,pcpu,rss,state,command 2>&1 || echo "(process gone)"
            echo "=== /tmp/server.log ==="
            cat /tmp/server.log || echo "(empty / missing)"
            echo "=== thread stack snapshot (where is it stuck?) ==="
            # macOS built-in: prints all thread call stacks for the live PID.
            # 1-second sample is plenty for a process at ~0% CPU; longer just
            # produces redundant frames. -mayDie: tolerate process death mid-sample.
            sample "$SERVER_PID" 1 -mayDie 2>&1 | head -120 || echo "(sample failed / process gone)"
            echo "=== ls of bundle ==="
            ls -la ../engine/dist/jank-engine/bin ../engine/dist/jank-engine/lib/jank-engine 2>&1 | head -30
            echo "=== otool -L on the binary ==="
            otool -L ../engine/dist/jank-engine/bin/jank-engine 2>&1 | head -30
            echo "=== launcher ==="
            cat ../engine/dist/jank-engine/jank-engine_run
            echo "=== installed jank / clang ==="
            command -v jank
            jank check-health 2>&1 || true
            /opt/homebrew/opt/llvm/bin/clang++ --version 2>&1 || echo "installed clang failed"
            echo "=== try running the binary directly with --help (very early exit path) ==="
            "$ENGINE" 2>&1 | head -20 || echo "(exited non-zero)"
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi

          # Let the server tick for a few seconds, confirm it stays up.
          sleep 5
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "::error::server died after binding"
            cat /tmp/server.log
            exit 1
          fi
          echo "✓ server stable for ~5s after bind"

          kill "$SERVER_PID" 2>/dev/null || true
          wait 2>/dev/null || true

      - name: Upload server / client logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-macos-arm64
          path: |
            /tmp/server.log
            /tmp/client.log
            /tmp/baked-server.log
          if-no-files-found: ignore

      - name: Upload jank-engine binary
        uses: actions/upload-artifact@v4
        with:
          name: jank-engine-macos-arm64
          path: engine/dist/jank-engine/
          retention-days: 14
